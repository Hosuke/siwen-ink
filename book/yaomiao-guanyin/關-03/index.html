    <meta property="og:description" content="杳眇曰：極之一篇，關尹書九篇之樞也。考之全書，他篇多涉五行、數術、丹鼎之說，獨此篇不染其辭，於術語叢雜之中，挺然特出，質勁而旨純。昔人疑關尹為唐宋間人所依托，固有以也。然即此一篇論之，其思想脈絡實接乎老氏「聖人無常心，以百姓心為心」之緒，與莊子《應帝王》所述至人用心若鏡之境，氣脈相通，非後世方士所能…" />
